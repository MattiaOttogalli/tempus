<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mappa Interattiva - Tempus 2026</title>
    
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>

    <style>
        :root { --medieval-blue: #2c3e50; --gold: #f1c40f; --parchment: #e0d7c6; }
        
        * { box-sizing: border-box; }

        body { 
            margin: 0; 
            padding: 0;
            display: flex; 
            height: 100vh; 
            width: 100vw;
            font-family: 'Georgia', serif; 
            background: var(--medieval-blue);
            overflow: hidden; 
        }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: 320px; 
            background: var(--medieval-blue); 
            color: white; 
            padding: 20px; 
            overflow-y: auto; 
            z-index: 1001; 
            box-shadow: 2px 0 15px rgba(0,0,0,0.5); 
            height: 100vh;
            flex-shrink: 0;
        }
        
        .sidebar h2 { font-size: 1.2rem; border-bottom: 2px solid var(--gold); padding-bottom: 10px; color: var(--gold); text-transform: uppercase; margin-top: 0; }
        .legend-item { cursor: pointer; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.9rem; transition: 0.2s; list-style: none; }
        .legend-item:hover { color: var(--gold); }

        /* --- VIEWPORT MAPPA (FULL SCREEN) --- */
        .map-viewport {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            background: var(--parchment); 
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }

        #panzoom-element {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #map-image {
            /* Queste righe eliminano le barre nere */
            width: 100%;
            height: 100%;
            object-fit: cover; /* Riempie lo spazio ritagliando l'eccesso */
            display: block;
        }

        /* --- PUNTI CLICCABILI --- */
        .map-point {
            position: absolute;
            width: 50px; /* Area di tocco aumentata per mobile */
            height: 50px;
            transform: translate(-50%, -50%);
            z-index: 10; 
            cursor: pointer;
            background: rgba(255, 0, 0, 0); /* Cambia in 0.2 per vedere i cerchi durante i test */
            border-radius: 50%;
        }

        /* --- MOBILE --- */
        .hamburger { 
            display: none; 
            position: fixed; 
            top: 15px; 
            left: 15px; 
            z-index: 1002; 
            background: var(--medieval-blue); 
            border: 2px solid var(--gold); 
            border-radius: 5px; 
            padding: 10px; 
        }
        
        .hamburger span { display: block; width: 25px; height: 3px; background: var(--gold); margin-bottom: 4px; }

        @media (max-width: 768px) {
            .hamburger { display: block; }
            .sidebar { 
                position: fixed; 
                left: 0; 
                top: 0; 
                transform: translateX(-100%); 
                width: 280px; 
                transition: transform 0.3s ease;
            }
            .sidebar.active { transform: translateX(0); }
        }

        /* --- MODALE --- */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); align-items: center; justify-content: center; }
        .modal-content { background: #fdfaf0; padding: 25px; width: 85%; max-width: 400px; border-radius: 8px; text-align: center; border: 4px solid var(--medieval-blue); position: relative; }
        .close { position: absolute; right: 15px; top: 5px; font-size: 35px; cursor: pointer; color: var(--medieval-blue); }
    </style>
</head>
<body>

<button class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button>

<div class="sidebar" id="sidebarMenu">
    <h2>I Luoghi della Festa</h2>
    <div class="legend-item" onclick="showInfo('Antro et Locanda de lo Duomo', '1️⃣ Ristoro medievale situato sotto le volte del Duomo.')">1️⃣ Antro et Locanda de lo Duomo</div>
    <div class="legend-item" onclick="showInfo('Cort dal Diaul', '2️⃣ Ristoro suggestivo tra le mura.')">2️⃣ Cort dal Diaul</div>
    <div class="legend-item" onclick="showInfo('Cervogeria de lo Eretico', '3️⃣ Birre artigianali ed elisir.')">3️⃣ Cervogeria de lo Eretico</div>
    <div class="legend-item" onclick="showInfo('Taberna de lo Rospo', '4️⃣ Osteria tipica per viandanti.')">4️⃣ Taberna de lo Rospo</div>
    <div class="legend-item" onclick="showInfo('Porta Paninorum', '5️⃣ Sapori tradizionali.')">5️⃣ Porta Paninorum</div>
    <div class="legend-item" onclick="showInfo('Taberna Pane et Salamen', '6️⃣ Specialità locali.')">6️⃣ Taberna Pane et Salamen</div>
</div>

<div class="map-viewport">
    <div id="panzoom-element">
        <img src="FRONTE.jpg" id="map-image" alt="Mappa">
        
        <div class="map-point" style="top: 36%; left: 68.5%;" onclick="showInfo('Locanda del Duomo', 'Ristoro numero 1')"></div>
        <div class="map-point" style="top: 44.5%; left: 44.5%;" onclick="showInfo('Piazzetta Portuzza', 'Ristoro numero 2')"></div>
        <div class="map-point" style="top: 54%; left: 54.5%;" onclick="showInfo('Cervogeria', 'Ristoro numero 3')"></div>
        <div class="map-point" style="top: 61%; left: 65%;" onclick="showInfo('Taberna del Rospo', 'Ristoro numero 4')"></div>
        <div class="map-point" style="top: 29%; left: 29%;" onclick="showInfo('Porta Paninorum', 'Ristoro numero 5')"></div>
        <div class="map-point" style="top: 38.5%; left: 21%;" onclick="showInfo('Pane et Salamen', 'Ristoro numero 6')"></div>
    </div>
</div>

<div id="infoModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="modal-title"></h2>
        <p id="modal-text"></p>
    </div>
</div>

<script>
    const elem = document.getElementById('panzoom-element');
    const panzoom = Panzoom(elem, {
        maxScale: 4,
        minScale: 1, // Parte a dimensione intera
        contain: 'outside', // Impedisce di vedere i bordi vuoti trascinando
        startScale: 1
    });

    elem.parentElement.addEventListener('wheel', panzoom.zoomWithWheel);

    function toggleMenu() { document.getElementById('sidebarMenu').classList.toggle('active'); }
    function showInfo(title, text) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-text').innerText = text;
        document.getElementById('infoModal').style.display = "flex";
        if (window.innerWidth <= 768) document.getElementById('sidebarMenu').classList.remove('active');
    }
    function closeModal() { document.getElementById('infoModal').style.display = "none"; }
    window.onclick = function(e) { if (e.target.className === 'modal') closeModal(); }
</script>

</body>
</html>
